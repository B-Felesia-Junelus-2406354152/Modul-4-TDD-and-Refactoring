<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create New Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>

<div class="container">
    <h3>Create New Order</h3>

    <!-- Placeholder for products selection and order submission -->
    <form th:action="@{/order/create}" method="post">
        <!-- Add a sample list of products placeholder, will be connected in real impl -->
        <p>Your products to checkout...</p>
        <!-- Author name might be needed depending on implementation -->
        <div class="form-group">
            <label for="authorInput">Author Name</label>
            <input th:name="author" type="text" class="form-control mb-4 col-4" id="authorInput" placeholder="Enter author name">
        </div>
        <button type="submit" class="btn btn-primary">Submit Order</button>
    </form>
</div>

</body>
</html>
