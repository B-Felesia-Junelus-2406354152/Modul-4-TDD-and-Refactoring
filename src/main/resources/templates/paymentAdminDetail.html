<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Payment Admin Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>

<body>

    <div class="container mt-5">
        <h3>Payment Admin Detail</h3>

        <div th:if="${payment != null}">
            <p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>
            <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
            <p><strong>Status:</strong> <span th:text="${payment.status}"></span></p>

            <form th:action="@{/payment/admin/set-status/{paymentId}(paymentId=${payment.id})}" method="post"
                class="mt-4 form-inline">
                <div class="form-group mr-2">
                    <label for="statusSelect" class="mr-2">Update Status:</label>
                    <select name="status" id="statusSelect" class="form-control">
                        <option value="SUCCESS">ACCEPT (SUCCESS)</option>
                        <option value="REJECTED">REJECT</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Update</button>
            </form>
        </div>

        <div th:if="${payment == null}">
            <p class="text-danger">Payment not found.</p>
        </div>

        <a th:href="@{/payment/admin/list}" class="btn btn-secondary mt-3">Back to List</a>
    </div>

</body>

</html>
