<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>

<body>

    <div class="container mt-5">
        <h3>Payment Detail</h3>

        <div th:if="${payment != null}">
            <p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>
            <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
            <p><strong>Status:</strong>
                <span th:if="${payment.status == 'SUCCESS'}" class="badge badge-success"
                    th:text="${payment.status}"></span>
                <span th:if="${payment.status == 'REJECTED'}" class="badge badge-danger"
                    th:text="${payment.status}"></span>
                <span th:if="${payment.status == 'PENDING'}" class="badge badge-warning"
                    th:text="${payment.status}"></span>
            </p>

            <h5 class="mt-4 border-bottom pb-2">Your Payment Details</h5>
            <table class="table table-sm table-bordered mt-2">
                <tbody>
                    <tr th:each="entry : ${payment.paymentData}">
                        <th class="w-25 bg-light" th:text="${entry.key}"></th>
                        <td th:text="${entry.value}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${payment == null}">
            <p class="text-danger">Payment not found or please specify Payment ID.</p>
        </div>

        <a th:href="@{/order/history}" class="btn btn-secondary mt-3">Back to Order History</a>
    </div>

</body>

</html>
