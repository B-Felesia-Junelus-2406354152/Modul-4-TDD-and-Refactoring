<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>

<body>

    <div class="container mt-5">
        <h3>Payment Detail</h3>

        <div th:if="${payment != null}">
            <p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>
            <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
            <p><strong>Status:</strong> <span th:text="${payment.status}"></span></p>
            <!-- Adding order reference explicitly if applicable -->
            <p><strong>Order ID:</strong> <span th:text="${payment.order.id}"></span></p>
        </div>

        <div th:if="${payment == null}">
            <p class="text-danger">Payment not found or please specify Payment ID.</p>
        </div>

        <a th:href="@{/order/history}" class="btn btn-secondary mt-3">Back to Order History</a>
    </div>

</body>

</html>
