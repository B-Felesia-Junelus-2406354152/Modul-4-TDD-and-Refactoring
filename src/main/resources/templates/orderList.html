<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Customer Order List</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>

<body>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Your Order History</h2>
            <a th:href="@{/order/create}" class="btn btn-success">+ Create New Order</a>
        </div>

        <div th:if="${orders.isEmpty()}" class="alert alert-info" role="alert">
            You don't have any orders yet.
        </div>

        <div th:if="${!orders.isEmpty()}" class="table-responsive">
            <table class="table table-hover table-bordered text-center">
                <thead class="thead-light">
                    <tr>
                        <th style="width: 15%">Order ID</th>
                        <th style="width: 25%">Order Time (ms)</th>
                        <th style="width: 20%">Items Count</th>
                        <th style="width: 20%">Status</th>
                        <th style="width: 20%">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td class="align-middle border-bottom p-3"><span th:text="${order.id}"></span></td>
                        <td class="align-middle border-bottom p-3" th:text="${order.orderTime}"></td>
                        <td class="align-middle border-bottom p-3" th:text="${order.products.size()} + ' item(s)'"></td>
                        <td class="align-middle border-bottom p-3">
                            <span th:if="${order.status == 'WAITING_PAYMENT'}" class="badge badge-warning p-2">WAITING
                                PAYMENT</span>
                            <span th:if="${order.status == 'SUCCESS'}" class="badge badge-success p-2">SUCCESS</span>
                            <span th:if="${order.status == 'FAILED'}" class="badge badge-danger p-2">FAILED</span>
                            <span
                                th:if="${order.status != 'WAITING_PAYMENT' and order.status != 'SUCCESS' and order.status != 'FAILED'}"
                                class="badge badge-secondary p-2" th:text="${order.status}"></span>
                        </td>
                        <td class="align-middle border-bottom p-3">
                            <a th:if="${order.status == 'WAITING_PAYMENT'}"
                                th:href="@{/order/pay/{orderId}(orderId=${order.id})}"
                                class="btn btn-sm btn-primary">Pay Now</a>
                            <button th:if="${order.status != 'WAITING_PAYMENT'}" class="btn btn-sm btn-secondary"
                                disabled>No Action</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4">
            <a th:href="@{/order/history}" class="btn btn-outline-secondary">Search Different Author</a>
            <a th:href="@{/}" class="btn btn-outline-dark">Back to Home</a>
        </div>
    </div>

</body>

</html>
