<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>

<body>

    <div class="container mt-5">
        <h3>Pay Order</h3>

        <div th:if="${order != null}">
            <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
            <p><strong>Total Items:</strong> <span th:text="${order.products.size()}"></span></p>
            <p><strong>Author:</strong> <span th:text="${order.author}"></span></p>

            <form th:action="@{/order/pay/{orderId}(orderId=${order.id})}" method="post" class="mt-4">
                <div class="form-group">
                    <label for="paymentMethod">Select Payment Method:</label>
                    <select name="paymentMethod" id="paymentMethod" class="form-control col-md-4">
                        <option value="CASH">Cash</option>
                        <option value="TRANSFER">Transfer</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary mt-2">Submit Payment</button>
            </form>
        </div>

        <div th:if="${order == null}">
            <p class="text-danger">Order not found.</p>
        </div>

        <a th:href="@{/order/history}" class="btn btn-secondary mt-3">Back to History</a>
    </div>

</body>

</html>
